name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # changesets bot updates the Version PR
  pull-requests: write  # changesets bot opens the Version PR
  id-token: write       # required for npm provenance via OIDC and Sigstore attestation
  attestations: write   # required for actions/attest-sbom to store attestations

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets needs the full history to detect changes

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm publish -r --access public --provenance
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # SBOM + attestation gated on `published == true` so they only run when
      # packages actually hit npm — not when the changesets action just opens
      # the Version PR.
      - name: Generate SBOM (Syft / SPDX)
        if: steps.changesets.outputs.published == 'true'
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: sbom.spdx.json
          upload-artifact: true

      - name: Attest SBOM (Sigstore-signed)
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-sbom@v2
        with:
          subject-path: 'packages/*/dist/**'
          sbom-path: sbom.spdx.json
